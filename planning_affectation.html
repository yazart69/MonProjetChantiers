<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning d'Affectation - Gestion de Chantier</title>
    <style>
        :root {
            --primary-red: #dc2626;
            --primary-orange: #ea580c;
            --primary-blue: #2563eb;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
            --info: #0ea5e9;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-900: #111827;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            padding: 2rem;
        }

        .header {
            background: var(--white);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            border-left: 6px solid var(--primary-red);
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-red), var(--primary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: #6b7280;
        }

        .controls-section {
            background: var(--white);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-label {
            font-weight: 600;
            color: var(--gray-900);
            font-size: 0.9rem;
        }

        .control-input,
        .control-select {
            padding: 0.75rem;
            border: 2px solid var(--gray-200);
            border-radius: 0.5rem;
            font-size: 0.9rem;
            background: var(--white);
            transition: border-color 0.3s;
        }

        .control-input:focus,
        .control-select:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .planning-section {
            background: var(--white);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .planning-grid {
            display: grid;
            grid-template-columns: 250px repeat(7, 1fr);
            gap: 1px;
            background: var(--gray-200);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .planning-header {
            background: var(--primary-red);
            color: white;
            padding: 1rem;
            font-weight: 600;
            text-align: center;
            font-size: 0.9rem;
        }

        .planning-cell {
            background: var(--white);
            padding: 0.5rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chantier-cell {
            background: var(--gray-50);
            font-weight: 600;
            color: var(--gray-900);
            justify-content: flex-start;
            padding-left: 1rem;
        }

        .day-select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.25rem;
            font-size: 0.8rem;
            background: var(--white);
        }

        .day-select:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .recap-section {
            background: var(--white);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }

        .recap-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .recap-table th,
        .recap-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .recap-table th {
            background: var(--gray-50);
            font-weight: 600;
            color: var(--gray-900);
        }

        .recap-table tr:hover {
            background: var(--gray-50);
        }

        .week-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .week-info {
            background: var(--info);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
        }

        @media print {
            @page {
                size: A4 landscape;
                margin: 1cm;
            }

            body {
                font-size: 10pt;
                color: #000;
                background: #fff;
                padding: 0;
            }

            .header,
            .controls-section {
                display: none !important;
            }

            .planning-section,
            .recap-section {
                box-shadow: none;
                border: 1px solid #000;
                margin-bottom: 1cm;
                page-break-inside: avoid;
            }

            .btn {
                display: none !important;
            }

            .planning-grid {
                font-size: 8pt;
            }

            .planning-header {
                background: #000 !important;
                color: #fff !important;
            }

            .recap-table {
                font-size: 9pt;
            }

            .recap-table th {
                background: #f0f0f0 !important;
            }

            /* Styles pour impression tableau seulement */
            body.print-table-only .planning-section {
                display: none !important;
            }

            body.print-table-only #stats-section {
                display: none !important;
            }

            /* Styles pour impression complète */
            body.print-complete .planning-section,
            body.print-complete .recap-section,
            body.print-complete #stats-section {
                display: block !important;
                page-break-inside: avoid;
            }

            #print-header,
            #print-header-simple {
                display: block !important;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .planning-grid {
                grid-template-columns: 200px repeat(7, 80px);
                overflow-x: auto;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="page-title">📅 Planning d'Affectation</h1>
        <p class="page-subtitle">Gestion des affectations par chantiers et par jours de la semaine</p>
    </div>

    <div class="controls-section">
        <div class="controls-grid">
            <div class="control-group">
                <label class="control-label">📅 Semaine</label>
                <input type="week" id="week-selector" class="control-input">
            </div>
            <div class="control-group">
                <label class="control-label">👥 Équipe</label>
                <select id="team-selector" class="control-select">
                    <option value="equipe41">Équipe 41 - Chasse sur Rhône</option>
                    <option value="autre">Autre équipe</option>
                </select>
            </div>
            <div class="control-group">
                <label class="control-label">Actions</label>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary" onclick="generatePlanning()">🔄 Générer Planning</button>
                    <button class="btn btn-success" onclick="savePlanning()">💾 Sauvegarder</button>
                </div>
            </div>
        </div>
    </div>

    <div class="planning-section">
        <div class="section-title">
            <span>🏗️ Affectation par Chantiers</span>
            <div class="week-info" id="week-info">Semaine 38 - 2025</div>
        </div>
        
        <div class="planning-grid" id="planning-grid">
            <div class="planning-header">Chantiers</div>
            <div class="planning-header">L</div>
            <div class="planning-header">M</div>
            <div class="planning-header">M</div>
            <div class="planning-header">J</div>
            <div class="planning-header">V</div>
            <div class="planning-header">S</div>
            <div class="planning-header">D</div>
        </div>
    </div>

    <div class="recap-section">
        <div class="section-title">
            📊 Récapitulatif des Affectations
            <div style="margin-left: auto; display: flex; gap: 0.5rem;">
                <button class="btn btn-success" onclick="exportToCSV()">📄 Export CSV</button>
                <button class="btn btn-warning" onclick="printPlanning()">🖨️ Imprimer Planning</button>
            </div>
        </div>
        
        <div class="week-selector">
            <label>Semaine sélectionnée :</label>
            <span class="week-info" id="recap-week-info">Semaine 38 - 2025</span>
        </div>

        <table class="recap-table" id="recap-table">
            <thead>
                <tr>
                    <th>Chantier</th>
                    <th>Lundi</th>
                    <th>Mardi</th>
                    <th>Mercredi</th>
                    <th>Jeudi</th>
                    <th>Vendredi</th>
                    <th>Samedi</th>
                    <th>Dimanche</th>
                    <th>Total Jours</th>
                </tr>
            </thead>
            <tbody id="recap-tbody">
            </tbody>
        </table>
    </div>

    <script>
        // Liste des chantiers
        const chantiers = [
            'HALLE 9',
            'PONT DE CHASSE',
            'VICHY',
            'CAMPENON BERNARD',
            'PARKING BARET MARSEILLE',
            'PARKING CANNES',
            'QPARK FAVENTINE VALENCE',
            'STADE VELODROME MARSEILLE',
            'FRAMATOME CHALONS',
            'SAINT GOBAIN - Atelier',
            'PARKING MONTPELLIER',
            'PARKING COUR JULIEN MARSEILLE',
            'CNR VAUGRIS',
            'QPARK HDV MARSEILLE',
            'PARKING BEZIERS',
            'PARKING CHATEAUCREUX ST ETIENNE',
            'ADISEO PONTICELLI ROUSSILLON',
            'ATELIER ST MAURICE',
            'AUTRES CHANTIERS (préciser)'
        ];

        // Options pour les sélecteurs de jours
        const dayOptions = [
            { value: '', text: 'Non affecté' },
            { value: 'equipe-complete', text: 'Équipe complète' },
            { value: '1-personne', text: '1 personne' },
            { value: '2-personnes', text: '2 personnes' },
            { value: '3-personnes', text: '3 personnes' },
            { value: '4-personnes', text: '4 personnes' },
            { value: '5-personnes', text: '5 personnes' },
            { value: 'chef-equipe', text: 'Chef d\'équipe' },
            { value: 'specialiste', text: 'Spécialiste' },
            { value: 'maintenance', text: 'Maintenance' },
            { value: 'formation', text: 'Formation' },
            { value: 'conge', text: 'Congé' }
        ];

        // Données de planning
        let planningData = {};

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            initializeWeekSelector();
            generatePlanning();
            loadSavedData();
        });

        function initializeWeekSelector() {
            const weekSelector = document.getElementById('week-selector');
            const today = new Date();
            const year = today.getFullYear();
            const week = getWeekNumber(today);
            weekSelector.value = `${year}-W${week.toString().padStart(2, '0')}`;
            updateWeekInfo();
        }

        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function updateWeekInfo() {
            const weekSelector = document.getElementById('week-selector');
            const [year, week] = weekSelector.value.split('-W');
            const weekInfo = `Semaine ${week} - ${year}`;
            document.getElementById('week-info').textContent = weekInfo;
            document.getElementById('recap-week-info').textContent = weekInfo;
        }

        function generatePlanning() {
            updateWeekInfo();
            const grid = document.getElementById('planning-grid');
            
            // Garder seulement les en-têtes
            grid.innerHTML = `
                <div class="planning-header">Chantiers</div>
                <div class="planning-header">L</div>
                <div class="planning-header">M</div>
                <div class="planning-header">M</div>
                <div class="planning-header">J</div>
                <div class="planning-header">V</div>
                <div class="planning-header">S</div>
                <div class="planning-header">D</div>
            `;

            // Ajouter les lignes pour chaque chantier
            chantiers.forEach((chantier, index) => {
                // Cellule du nom du chantier
                const chantierCell = document.createElement('div');
                chantierCell.className = 'planning-cell chantier-cell';
                chantierCell.textContent = chantier;
                grid.appendChild(chantierCell);

                // Cellules pour chaque jour de la semaine
                for (let day = 0; day < 7; day++) {
                    const dayCell = document.createElement('div');
                    dayCell.className = 'planning-cell';
                    
                    const select = document.createElement('select');
                    select.className = 'day-select';
                    select.id = `${index}-${day}`;
                    select.onchange = () => updateRecap();

                    dayOptions.forEach(option => {
                        const optionElement = document.createElement('option');
                        optionElement.value = option.value;
                        optionElement.textContent = option.text;
                        select.appendChild(optionElement);
                    });

                    dayCell.appendChild(select);
                    grid.appendChild(dayCell);
                }
            });

            updateRecap();
        }

        function updateRecap() {
            const tbody = document.getElementById('recap-tbody');
            tbody.innerHTML = '';

            let totalParJour = [0, 0, 0, 0, 0, 0, 0]; // Compteurs pour chaque jour
            let chantiersActifs = 0;

            chantiers.forEach((chantier, chantierIndex) => {
                const row = document.createElement('tr');
                
                // Nom du chantier
                const chantierCell = document.createElement('td');
                chantierCell.textContent = chantier;
                chantierCell.style.fontWeight = '600';
                row.appendChild(chantierCell);

                let totalJours = 0;
                let chantierActif = false;

                // Cellules pour chaque jour
                for (let day = 0; day < 7; day++) {
                    const dayCell = document.createElement('td');
                    const select = document.getElementById(`${chantierIndex}-${day}`);
                    const value = select ? select.value : '';
                    
                    if (value) {
                        const option = dayOptions.find(opt => opt.value === value);
                        dayCell.textContent = option ? option.text : value;
                        dayCell.style.background = '#e0f2fe';
                        dayCell.style.fontWeight = '500';
                        totalJours++;
                        totalParJour[day]++;
                        chantierActif = true;
                    } else {
                        dayCell.textContent = '-';
                        dayCell.style.color = '#9ca3af';
                    }
                    
                    row.appendChild(dayCell);
                }

                if (chantierActif) {
                    chantiersActifs++;
                }

                // Total des jours
                const totalCell = document.createElement('td');
                totalCell.textContent = totalJours;
                totalCell.style.fontWeight = '600';
                totalCell.style.background = totalJours > 0 ? '#dcfce7' : '#fef2f2';
                totalCell.style.color = totalJours > 0 ? '#166534' : '#dc2626';
                row.appendChild(totalCell);

                tbody.appendChild(row);
            });

            // Ajouter une ligne de totaux
            const totalRow = document.createElement('tr');
            totalRow.style.borderTop = '2px solid var(--primary-red)';
            totalRow.style.background = '#fef9c3';
            totalRow.style.fontWeight = '700';

            const totalLabelCell = document.createElement('td');
            totalLabelCell.textContent = 'TOTAL AFFECTATIONS';
            totalLabelCell.style.color = 'var(--primary-red)';
            totalRow.appendChild(totalLabelCell);

            let totalGeneral = 0;
            totalParJour.forEach(total => {
                const cell = document.createElement('td');
                cell.textContent = total;
                cell.style.color = 'var(--primary-red)';
                totalRow.appendChild(cell);
                totalGeneral += total;
            });

            const totalGeneralCell = document.createElement('td');
            totalGeneralCell.textContent = totalGeneral;
            totalGeneralCell.style.color = 'var(--primary-red)';
            totalGeneralCell.style.fontSize = '1.1rem';
            totalRow.appendChild(totalGeneralCell);

            tbody.appendChild(totalRow);

            // Mettre à jour les statistiques
            updateStatistics(chantiersActifs, totalGeneral);
        }

        function updateStatistics(chantiersActifs, totalAffectations) {
            // Créer ou mettre à jour la section des statistiques
            let statsSection = document.getElementById('stats-section');
            if (!statsSection) {
                statsSection = document.createElement('div');
                statsSection.id = 'stats-section';
                statsSection.className = 'recap-section';
                statsSection.innerHTML = `
                    <div class="section-title">📈 Statistiques de la Semaine</div>
                    <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem;">
                        <div class="stat-card" style="background: var(--white); border-radius: 0.5rem; padding: 1.5rem; text-align: center; border-left: 4px solid var(--success);">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--success);" id="stat-chantiers">0</div>
                            <div style="font-size: 0.9rem; color: var(--gray-900); font-weight: 600;">Chantiers Actifs</div>
                        </div>
                        <div class="stat-card" style="background: var(--white); border-radius: 0.5rem; padding: 1.5rem; text-align: center; border-left: 4px solid var(--primary-blue);">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--primary-blue);" id="stat-affectations">0</div>
                            <div style="font-size: 0.9rem; color: var(--gray-900); font-weight: 600;">Total Affectations</div>
                        </div>
                        <div class="stat-card" style="background: var(--white); border-radius: 0.5rem; padding: 1.5rem; text-align: center; border-left: 4px solid var(--warning);">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--warning);" id="stat-moyenne">0</div>
                            <div style="font-size: 0.9rem; color: var(--gray-900); font-weight: 600;">Moyenne/Jour</div>
                        </div>
                        <div class="stat-card" style="background: var(--white); border-radius: 0.5rem; padding: 1.5rem; text-align: center; border-left: 4px solid var(--info);">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--info);" id="stat-taux">0%</div>
                            <div style="font-size: 0.9rem; color: var(--gray-900); font-weight: 600;">Taux d'Occupation</div>
                        </div>
                    </div>
                `;
                document.querySelector('.recap-section').parentNode.insertBefore(statsSection, document.querySelector('.recap-section').nextSibling);
            }

            // Mettre à jour les valeurs
            document.getElementById('stat-chantiers').textContent = chantiersActifs;
            document.getElementById('stat-affectations').textContent = totalAffectations;
            document.getElementById('stat-moyenne').textContent = (totalAffectations / 7).toFixed(1);
            
            const tauxOccupation = Math.round((chantiersActifs / chantiers.length) * 100);
            document.getElementById('stat-taux').textContent = tauxOccupation + '%';
        }

        function savePlanning() {
            const weekSelector = document.getElementById('week-selector');
            const weekKey = weekSelector.value;
            
            const data = {};
            chantiers.forEach((chantier, chantierIndex) => {
                data[chantier] = {};
                for (let day = 0; day < 7; day++) {
                    const select = document.getElementById(`${chantierIndex}-${day}`);
                    if (select) {
                        data[chantier][day] = select.value;
                    }
                }
            });

            planningData[weekKey] = data;
            localStorage.setItem('planningAffectation', JSON.stringify(planningData));
            
            alert('✅ Planning sauvegardé avec succès !');
        }

        function loadSavedData() {
            const saved = localStorage.getItem('planningAffectation');
            if (saved) {
                planningData = JSON.parse(saved);
                loadWeekData();
            }
        }

        function loadWeekData() {
            const weekSelector = document.getElementById('week-selector');
            const weekKey = weekSelector.value;
            
            if (planningData[weekKey]) {
                const data = planningData[weekKey];
                chantiers.forEach((chantier, chantierIndex) => {
                    if (data[chantier]) {
                        for (let day = 0; day < 7; day++) {
                            const select = document.getElementById(`${chantierIndex}-${day}`);
                            if (select && data[chantier][day]) {
                                select.value = data[chantier][day];
                            }
                        }
                    }
                });
                updateRecap();
            }
        }

        function printPlanning() {
            // Créer une fenêtre de dialogue pour les options d'impression
            const printOptions = confirm(
                "Options d'impression :\n\n" +
                "OK = Imprimer le planning complet avec statistiques\n" +
                "Annuler = Imprimer seulement le tableau d'affectation"
            );

            if (printOptions) {
                // Impression complète
                printComplete();
            } else {
                // Impression tableau seulement
                printTableOnly();
            }
        }

        function printComplete() {
            // Ajouter une classe pour l'impression complète
            document.body.classList.add('print-complete');
            
            // Créer un en-tête d'impression
            const printHeader = document.createElement('div');
            printHeader.id = 'print-header';
            printHeader.innerHTML = `
                <div style="text-align: center; margin-bottom: 2cm; border-bottom: 2px solid #000; padding-bottom: 0.5cm;">
                    <h1 style="font-size: 18pt; margin-bottom: 0.5cm;">PLANNING D'AFFECTATION - ÉQUIPE 41</h1>
                    <p style="font-size: 12pt; margin: 0;">Chasse sur Rhône • Altrad Prezioso</p>
                    <p style="font-size: 12pt; margin: 0;">${document.getElementById('week-info').textContent}</p>
                    <p style="font-size: 10pt; margin: 0.5cm 0 0 0;">Édité le ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR')}</p>
                </div>
            `;
            document.body.insertBefore(printHeader, document.body.firstChild);

            window.print();

            // Nettoyer après impression
            setTimeout(() => {
                document.body.classList.remove('print-complete');
                document.body.removeChild(printHeader);
            }, 1000);
        }

        function printTableOnly() {
            // Masquer tout sauf le tableau
            document.body.classList.add('print-table-only');
            
            // Créer un en-tête simple
            const printHeader = document.createElement('div');
            printHeader.id = 'print-header-simple';
            printHeader.innerHTML = `
                <div style="text-align: center; margin-bottom: 1cm;">
                    <h2 style="font-size: 14pt; margin-bottom: 0.3cm;">Tableau d'Affectation - ${document.getElementById('week-info').textContent}</h2>
                </div>
            `;
            document.body.insertBefore(printHeader, document.body.firstChild);

            window.print();

            // Nettoyer après impression
            setTimeout(() => {
                document.body.classList.remove('print-table-only');
                document.body.removeChild(printHeader);
            }, 1000);
        }

        function exportToCSV() {
            const weekInfo = document.getElementById('week-info').textContent;
            let csv = `Planning d'Affectation - ${weekInfo}\n\n`;
            csv += 'Chantier,Lundi,Mardi,Mercredi,Jeudi,Vendredi,Samedi,Dimanche,Total Jours\n';

            chantiers.forEach((chantier, chantierIndex) => {
                let row = `"${chantier}",`;
                let totalJours = 0;

                for (let day = 0; day < 7; day++) {
                    const select = document.getElementById(`${chantierIndex}-${day}`);
                    const value = select ? select.value : '';
                    
                    if (value) {
                        const option = dayOptions.find(opt => opt.value === value);
                        row += `"${option ? option.text : value}",`;
                        totalJours++;
                    } else {
                        row += '"-",';
                    }
                }
                
                row += `${totalJours}\n`;
                csv += row;
            });

            // Créer et télécharger le fichier
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `planning_affectation_${weekInfo.replace(/\s+/g, '_')}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Event listeners
        document.getElementById('week-selector').addEventListener('change', function() {
            updateWeekInfo();
            loadWeekData();
        });

        document.getElementById('team-selector').addEventListener('change', function() {
            generatePlanning();
        });
    </script>
</body>
</html>
